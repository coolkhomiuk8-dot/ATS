[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[functions."samsaraCron"]
  schedule = "*/2 * * * *"

[functions."dispatcher-reminders"]
  schedule = "*/30 * * * *"

[functions."dispatcher-digest"]
  schedule = "0 6 * * *"

[functions."driver-digest-am"]
  schedule = "0 12 * * *"

[functions."driver-digest-pm"]
  schedule = "0 22 * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
